*,::before,::after{box-sizing:border-box}

/* display */

.flex{display:flex}

/* overflow */

/* typography */

/* colors — text */
.text-white{color:#fff}
.text-gray-100{color:#f3f4f6}.text-gray-300{color:#d1d5db}.text-gray-400{color:#9ca3af}

.bg-yellow-600{background-color:#ca8a04}
.bg-green-600{background-color:#16a34a}

/* borders */
.border{border-width:1px}.border-b{border-bottom-width:1px}.border-r{border-right-width:1px}
.border-t{border-top-width:1px}

.rounded{border-radius:.25rem}.rounded-full{border-radius:9999px}

/* effects */
.transition{transition-property:color,background-color,border-color,opacity,transform;transition-timing-function:cubic-bezier(.4,0,.2,1);transition-duration:.15s}

<style>
.tab-section{display:none}.tab-section.active{display:block}
.nv-btn{width:100%;display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s;color:#9CA3AF;background:transparent;border:none;cursor:pointer;text-align:left}

}
function fmtN(n){return Number(n).toLocaleString("en-US")}
function pct(paid,total){if(!total)return 0;return Math.min(100,Math.round(paid/total*100))}

function toast(msg,type){
  var t=el("toast");t.textContent=msg;t.className="toast "+(type||"ok")+" show";

}

  var p=pct(paid,total);

  return'<div class="prog-bar"><div class="prog-fill" style="width:'+p+'%;background:'+c+'"></div></div>';

function saveMod(){
  if(eTable==="__pay"){savePay();return;}
  var rec={};
  if(eTable==="production"){
    rec={date:el("f0").value,stone:el("f1").value,
      metre:parseFloat(el("f2").value)||0,
      trucks:el("f3").value!==""?parseInt(el("f3").value):0,
      labor:el("f4").value!==""?parseFloat(el("f4").value):"",
      porter:el("f5").value!==""?parseFloat(el("f5").value):"",
      truck:el("f6").value!==""?parseFloat(el("f6").value):""};
  } else if(eTable==="customers"){
    var m=parseFloat(el("f2").value)||0,p=parseFloat(el("f3").value)||16,t=parseFloat((m*p).toFixed(2)),paid=parseFloat(el("f4").value)||0;
    rec={name:el("f0").value,phone:el("f1").value,metre:m,ppm:p,total:t,paid:paid,resto:parseFloat((t-paid).toFixed(2))};
  } else if(eTable==="betting"){
    var prev=parseFloat(el("f2").value)||0,newb=parseFloat(el("f3").value)||0;
    rec={date:el("f0").value,cashier:el("f1").value,prev:prev,newb:newb,diff:parseFloat((newb-prev).toFixed(2)),notes:el("f4").value};
  } else if(eTable==="expenses"){
    var s=parseFloat(el("f1").value)||0,f=parseFloat(el("f2").value)||0,r2=parseFloat(el("f3").value)||0;
    rec={staff:el("f0").value,salary:s,family:f,rent:r2,total:parseFloat((s+f+r2).toFixed(2))};
  }
  if(eId){
    DB[eTable]=DB[eTable].map(function(x){return x.id===eId?Object.assign({id:x.id},rec):x});
    toast("Wax la bedelay ✓","ok");
  } else {
    rec.id=DB.nid[eTable]++;DB[eTable].push(rec);
    toast("La keydiyay ✓","ok");
  }
  saveDB();
  closeMod();render();
}

function delRec(table,id){
  if(!confirm("Tirtirayaa?"))return;
  DB[table]=DB[table].filter(function(x){return x.id!==id});
  saveDB();
  toast("La tirtiray","err");render();
}

    +formGroup("Lacagta La Bixiyay ($)",fi("f-pay","number","","0.00"))
    +formGroup("Faallo (ikhtiyaari)",fi("f-pay-note","text","","Bixinta 1aad, EVC, cash..."))

function savePay(){
  var amt=parseFloat(el("f-pay").value)||0;
  if(amt<=0){toast("Lacag saxda ah geli","err");return;}
  var now=new Date();
  var taariikhda=now.toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"});
  var waqti=now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  var faallo=el("f-pay-note")?el("f-pay-note").value:"";
  DB.customers=DB.customers.map(function(c){
    if(c.id!==eId)return c;
    var np=parseFloat(Math.min(c.paid+amt,c.total).toFixed(2));
    var payments=c.payments||[];
    payments=payments.concat([{id:payments.length+1,lacag:amt,taariikhda:taariikhda,waqti:waqti,faallo:faallo}]);
    return Object.assign({},c,{paid:np,resto:parseFloat((c.total-np).toFixed(2)),payments:payments});
  });
  toast("Lacag-bixin "+money(amt)+" la diiwaangeliyay ✓","ok");
  saveDB();
  closeMod();render();
}

function exportCSV(){
  var tables={
    "Warshada_Waxsoosaarka":["Date,StoneType,Metre,Trucks,LaborCost,PorterCost,TruckCost"].concat(
      DB.production.map(function(r){return[r.date,r.stone,r.metre,r.trucks,r.labor,r.porter,r.truck].join(",")})),
    "Warshada_Macaamiisha":["CustomerName,Phone,Metre,PricePerMetre,TotalAmount,Paid,Resto"].concat(
      DB.customers.map(function(c){return[c.name,c.phone,c.metre,c.ppm,c.total,c.paid,c.resto].join(",")})),
    "Online_Betting":["Date,CashierName,PreviousBalance,NewBalance,Difference,Notes"].concat(
      DB.betting.map(function(b){return[b.date,b.cashier,b.prev,b.newb,b.diff,'"'+(b.notes||"")+'"'].join(",")})),
    "Qarashka_Guud":["StaffName,MonthlySalary,FamilyExpense,RentAndTransport,TotalExpense"].concat(
      DB.expenses.map(function(e){return[e.staff,e.salary,e.family,e.rent,e.total].join(",")}))
  };
  var csv="";
  Object.keys(tables).forEach(function(k){csv+="## "+k+"\n"+tables[k].join("\n")+"\n\n";});
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="business-hub-export.csv";a.click();
  toast("CSV la dejiyay ✓","ok");
}

          +'<button onclick="restoreCustomer('+i+')" style="background:#059669;color:#fff;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px">↩ Celi</button>'
          +'</div>';
      }).join("")+'</div>')
    +'</div>';
}

function restoreCustomer(i){
  var c=deletedCustomers[i];
  c.payments=c.payments||[];
  DB.customers.push(c);
  deletedCustomers.splice(i,1);
  saveDB();saveDeleted();
  toast(c.name+" dib loo celiyay ✓","ok");
  render();
}
function clearDeleted(){
  if(!confirm("Dhammaan macaamiisha tirtiran si buuxda u tirtiraysaa?"))return;
  deletedCustomers=[];saveDeleted();
  toast("La nadiifiyay","err");render();
}

// Override delRec to save to deleted list for customers
var _origDelRec=delRec;
delRec=function(table,id){
  if(table==="customers"){
    if(!confirm("Tirtirayaa?"))return;
    var c=DB.customers.find(function(x){return x.id===id});
    if(c){
      c.deletedAt=new Date().toLocaleDateString("en-GB");
      deletedCustomers.push(JSON.parse(JSON.stringify(c)));
      saveDeleted();
    }
    DB.customers=DB.customers.filter(function(x){return x.id!==id});
    saveDB();toast("La tirtiray","err");render();
  } else {
    _origDelRec(table,id);
  }
};

function doBackup(){
  var data=JSON.stringify({db:DB,deleted:deletedCustomers,auth:AUTH,version:"1.0",date:new Date().toISOString()},null,2);
  var blob=new Blob([data],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="biz-hub-backup-"+new Date().toLocaleDateString("en-GB").replace(/\//g,"-")+".json";
  a.click();
  toast("Backup la dejiyay ✓","ok");
}

function doRestore(){
  var f=document.getElementById("restore-file");
  if(!f.files||!f.files[0]){toast("Fayl dooro","err");return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.db){toast("Fayl-ka khalad ah","err");return;}
      if(!confirm("Xogta hadda jirta way tirtirmaysaa — sii wad?"))return;
      DB=data.db;
      if(data.deleted)deletedCustomers=data.deleted;
      if(data.auth)AUTH=data.auth;
      saveDB();saveDeleted();saveAuth();
      toast("Xogta dib loo celiyay ✓","ok");
      render();
    }catch(ex){toast("Fayl-ka khalad ah: "+ex.message,"err");}
  };
  reader.readAsText(f.files[0]);
}

function showSyncStatus(msg,type){
  var dot=document.getElementById("sync-dot");
  var lbl=document.getElementById("sync-lbl");
  if(dot&&lbl){
    dot.style.background=type==="ok"?"#10B981":type==="syncing"?"#F59E0B":"#EF4444";
    lbl.textContent=msg;
  }
  toast(msg,type==="ok"?"ok":"err");
}

// Save all DB to Firebase
function saveToFirebase(){
  if(!db)return;
  try{
    var ref=db.collection("biz-hub").doc("main-data");
    ref.set({
      production: DB.production,
      customers:  DB.customers,
      betting:    DB.betting,
      expenses:   DB.expenses,
      nid:        DB.nid,
      updatedAt:  new Date().toISOString()
    }).then(function(){
      showSyncStatus("☁️ Cloud ku keydsantay","ok");
    }).catch(function(e){
      console.warn("Firebase save error:",e);
    });
  }catch(e){console.warn(e);}
}

// Load from Firebase
function loadFromFirebase(){
  if(!db)return;
  db.collection("biz-hub").doc("main-data").get()
    .then(function(doc){
      if(doc.exists){
        var data=doc.data();
        DB.production = data.production || DB.production;
        DB.customers  = data.customers  || DB.customers;
        DB.betting    = data.betting    || DB.betting;
        DB.expenses   = data.expenses   || DB.expenses;
        DB.nid        = data.nid        || DB.nid;
        // ensure payments array
        DB.customers=DB.customers.map(function(c){
          return Object.assign({payments:[]},c);
        });
        saveDB(); // also save to localStorage
        render();
        showSyncStatus("☁️ Cloud ka la soo dejiyay","ok");
      } else {
        // No cloud data yet — upload local data
        saveToFirebase();
      }
    }).catch(function(e){
      console.warn("Firebase load error:",e);
    });
}

// Override saveDB to also save to Firebase
var _origSaveDB=saveDB;
saveDB=function(){
  _origSaveDB();
  saveToFirebase();
};
