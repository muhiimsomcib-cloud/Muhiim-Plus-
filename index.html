<script>
// ── DATABASE ──────────────────────────────────────────────
var DB={
  production:[
    {id:1,date:"19/04/2026",stone:"No.8",metre:1247,trucks:23,labor:"",porter:"",truck:""},
    {id:2,date:"14/05/2026",stone:"No.6",metre:127.5,trucks:0,labor:"",porter:"",truck:""}
  ],
  customers:[
    {id:1,name:"Xaawo Ceynte Kulmiye",    phone:"618658010",metre:78.75,ppm:16,total:1260,  paid:1000,resto:260},
    {id:2,name:"Abdullhi Shiiq Muxudiin", phone:"615825902",metre:150,  ppm:16,total:2400,  paid:1000,resto:1400},
    {id:3,name:"Dahabo Sharaxow Axmed",   phone:"615579726",metre:75,   ppm:16,total:1200,  paid:400, resto:800},
    {id:4,name:"Yuusuf Abdulle Qandhac",  phone:"615266261",metre:150,  ppm:16,total:2400,  paid:1200,resto:1200},
    {id:5,name:"Raxmo Abdi Cusmaaan",     phone:"612753830",metre:155,  ppm:16,total:2480,  paid:700, resto:1780}
  ],
  betting:[
    {id:1,date:"05/12/2025",cashier:"1xbet0303",    prev:17167.07,newb:4818.73, diff:-12348.34,notes:"12348.34"},
    {id:2,date:"05/12/2025",cashier:"1xbet 55",     prev:863.59,  newb:563.59,  diff:-300,    notes:"300"},
    {id:3,date:"27/05/2026",cashier:"winwin1 6526",  prev:1313.59, newb:1000.59, diff:-313,    notes:""},
    {id:4,date:"05/12/2025",cashier:"golden pari",  prev:102.21,  newb:81.75,   diff:-20.46,  notes:"golden pari =$-20.46 ka maqan xuurshe"}
  ],
  expenses:[
    {id:1,staff:"Yaasin Nuur Gulane",salary:250,family:400,rent:700,total:1350},
    {id:2,staff:"Xuurshe",           salary:250,family:300,rent:500,total:1050},
    {id:3,staff:"Cabdi casir",       salary:230,family:300,rent:400,total:930}
  ],
  nid:{production:3,customers:6,betting:5,expenses:4}
};

// ── STATE ─────────────────────────────────────────────────
var cur="overview",eId=null,eTable=null;
var cSearch="",cFilter="all",cSort="name";

// ── HELPERS ───────────────────────────────────────────────
function el(id){return document.getElementById(id)}
function money(n){
  if(n===""||n===null||n===undefined)return"—";
  return"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtN(n){return Number(n).toLocaleString("en-US")}
function pct(paid,total){if(!total)return 0;return Math.min(100,Math.round(paid/total*100))}
function ini(name){var p=name.trim().split(" ");return((p[0]||"")[0]||"").toUpperCase()+((p[1]||"")[0]||"").toUpperCase()}
function sum(arr,k){return arr.reduce(function(s,r){return s+(Number(r[k])||0)},0)}
function toast(msg,type){
  var t=el("toast");t.textContent=msg;t.className="toast "+(type||"ok")+" show";
  setTimeout(function(){t.className="toast"},2500);
}
function progHTML(paid,total){
  var p=pct(paid,total);
  var c=p>=100?"#059669":p>=50?"#D97706":"#DC2626";
  return'<div class="prog-bar"><div class="prog-fill" style="width:'+p+'%;background:'+c+'"></div></div>';
}
function statusBadge(paid,total){
  var p=pct(paid,total);
  if(p>=100)return'<span class="text-xs bg-green-500/20 text-green-400 border border-green-500/30 px-2 py-0.5 rounded-full font-semibold">&#10003; Bixiyay</span>';
  if(p>0)   return'<span class="text-xs bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 px-2 py-0.5 rounded-full font-semibold">&#9681; '+p+'%</span>';
  return      '<span class="text-xs bg-red-500/20 text-red-400 border border-red-500/30 px-2 py-0.5 rounded-full font-semibold">&#9711; Ma bixin</span>';
}

// ── NAVIGATION ────────────────────────────────────────────
var TITLES={
  overview:  ["Overview","Dhammaan ganacsiyada hal meel"],
  production:["Warshada — Waxsoosaarka","Diiwaanka wax soosaarka dhagaxa"],
  customers: ["Warshada — Macaamiisha","Xisaabaadka macaamiisha & lacag-bixinta"],
  betting:   ["Online Betting — Transactions","Diiwaanka residuals-ka cashier-yada"],
  expenses:  ["Qarashka Guud","Shaqaalaha & kharashka bishiiba"]
};

function goTo(screen){
  cur=screen;
  document.querySelectorAll(".nv-btn").forEach(function(b){b.classList.remove("on")});
  var nb=el("nv-"+screen);if(nb)nb.classList.add("on");
  render();
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  var c=el("content");
  if(cur==="overview")   c.innerHTML=renderOverview();
  else if(cur==="production") c.innerHTML=renderProduction();
  else if(cur==="customers")  c.innerHTML=renderCustomers();
  else if(cur==="betting")    c.innerHTML=renderBetting();
  else if(cur==="expenses")   c.innerHTML=renderExpenses();
}

// ── OVERVIEW ──────────────────────────────────────────────
function renderOverview(){
  var tTotal=sum(DB.customers,"total"),tPaid=sum(DB.customers,"paid"),tResto=sum(DB.customers,"resto");
  var tLoss=sum(DB.betting,"diff"),tExp=sum(DB.expenses,"total"),tMetres=sum(DB.production,"metre");
  var pending=DB.customers.filter(function(c){return c.resto>0}).length;

  var custRows=DB.customers.map(function(c){
    return'<tr class="border-b border-gray-700/50 hover:bg-gray-700/30 transition">'
      +'<td class="py-2.5 pr-3 font-medium">'+c.name+'</td>'
      +'<td class="pr-3">'+c.metre+'m</td>'
      +'<td class="pr-3">'+money(c.total)+'</td>'
      +'<td class="pr-3 text-green-400 font-semibold">'+money(c.paid)+'</td>'
      +'<td class="pr-3 '+(c.resto>0?"text-red-400":"text-green-400")+' font-bold">'+money(c.resto)+'</td>'
      +'<td>'+statusBadge(c.paid,c.total)+'</td>'
      +'</tr>';
  }).join("");

  var betRows=DB.betting.map(function(b){
    return'<tr class="border-b border-gray-700/50 hover:bg-gray-700/30 transition">'
      +'<td class="py-2.5 pr-3">'+b.date+'</td>'
      +'<td class="pr-3"><span class="text-xs bg-purple-500/20 text-purple-300 border border-purple-500/30 px-2 py-0.5 rounded-full">'+b.cashier+'</span></td>'
      +'<td class="pr-3">'+money(b.prev)+'</td>'
      +'<td class="pr-3">'+money(b.newb)+'</td>'
      +'<td class="text-red-400 font-bold">'+money(b.diff)+'</td>'

function formGroup(label,input){return'<div class="mb-3"><label class="block text-xs text-gray-400 mb-1">'+label+'</label>'+input+'</div>'}
function fi(id,type,val,ph){return'<input id="'+id+'" type="'+(type||"text")+'" value="'+(val!=null?val:"")+'" placeholder="'+(ph||"")+'"'+(type==="number"?' step="any"':"")+'>'}

function buildForm(table,r){
  r=r||{};var h="";
  if(table==="production"){
    h='<div class="grid grid-cols-2 gap-3">'
      +formGroup("Taariikhda",fi("f0","text",r.date,"DD/MM/YYYY"))
      +formGroup("Nooca Dhagaxa",fi("f1","text",r.stone,"No.8"))
      +formGroup("Mitirka",fi("f2","number",r.metre!==undefined?r.metre:"","0"))
      +formGroup("Gaadidka",fi("f3","number",r.trucks!==undefined?r.trucks:"","0"))
      +formGroup("Labor Cost ($)",fi("f4","number",r.labor,"ikhtiyaari"))
      +formGroup("Porter Cost ($)",fi("f5","number",r.porter,"ikhtiyaari"))
      +'<div class="col-span-2">'+formGroup("Truck Cost ($)",fi("f6","number",r.truck,"ikhtiyaari"))+'</div>'
      +'</div>';
  } else if(table==="customers"){
    h='<div class="space-y-2">'
      +'<div class="grid grid-cols-1">'+formGroup("Magaca Macamiilka",fi("f0","text",r.name,"Magaca buuxa"))+'</div>'
      +'<div class="grid grid-cols-2 gap-3">'
      +formGroup("Telefoonka",fi("f1","text",r.phone,"61xxxxxxx"))
      +formGroup("Mitirka",fi("f2","number",r.metre!==undefined?r.metre:"","0"))
      +formGroup("Qiimaha Mitirka ($)",fi("f3","number",r.ppm!==undefined?r.ppm:16,"16"))
      +formGroup("Lacagta La Bixiyay ($)",fi("f4","number",r.paid!==undefined?r.paid:0,"0"))
      +'</div></div>';
  } else if(table==="betting"){
    h='<div class="grid grid-cols-2 gap-3">'
      +formGroup("Taariikhda",fi("f0","text",r.date,"DD/MM/YYYY"))
      +formGroup("Magaca Cashier-ka",fi("f1","text",r.cashier,"Cashier ID"))
      +formGroup("Residual Hore ($)",fi("f2","number",r.prev!==undefined?r.prev:"","0"))
      +formGroup("Residual Cusub ($)",fi("f3","number",r.newb!==undefined?r.newb:"","0"))
      +'<div class="col-span-2">'+formGroup("Xusuusnaha",fi("f4","text",r.notes,"ikhtiyaari"))+'</div>'
      +'</div>';
  } else if(table==="expenses"){
    h='<div class="space-y-2">'
      +'<div>'+formGroup("Magaca Shaqaalaha",fi("f0","text",r.staff,"Magaca buuxa"))+'</div>'
      +'<div class="grid grid-cols-3 gap-3">'
      +formGroup("Mushaharka ($)",fi("f1","number",r.salary!==undefined?r.salary:"","0"))
      +formGroup("Qoyska ($)",fi("f2","number",r.family!==undefined?r.family:"","0"))
      +formGroup("Kiro+Gaadiidka ($)",fi("f3","number",r.rent!==undefined?r.rent:"","0"))
      +'</div></div>';
  }
  el("m-body").innerHTML=h;
}

function saveMod(){
  if(eTable==="__pay"){savePay();return;}
  var rec={};
  if(eTable==="production"){
    rec={date:el("f0").value,stone:el("f1").value,
      metre:parseFloat(el("f2").value)||0,
      trucks:el("f3").value!==""?parseInt(el("f3").value):0,
      labor:el("f4").value!==""?parseFloat(el("f4").value):"",
      porter:el("f5").value!==""?parseFloat(el("f5").value):"",
      truck:el("f6").value!==""?parseFloat(el("f6").value):""};
  } else if(eTable==="customers"){
    var m=parseFloat(el("f2").value)||0,p=parseFloat(el("f3").value)||16,t=parseFloat((m*p).toFixed(2)),paid=parseFloat(el("f4").value)||0;
    rec={name:el("f0").value,phone:el("f1").value,metre:m,ppm:p,total:t,paid:paid,resto:parseFloat((t-paid).toFixed(2))};
  } else if(eTable==="betting"){
    var prev=parseFloat(el("f2").value)||0,newb=parseFloat(el("f3").value)||0;
    rec={date:el("f0").value,cashier:el("f1").value,prev:prev,newb:newb,diff:parseFloat((newb-prev).toFixed(2)),notes:el("f4").value};
  } else if(eTable==="expenses"){
    var s=parseFloat(el("f1").value)||0,f=parseFloat(el("f2").value)||0,r2=parseFloat(el("f3").value)||0;
    rec={staff:el("f0").value,salary:s,family:f,rent:r2,total:parseFloat((s+f+r2).toFixed(2))};
  }
  if(eId){
    DB[eTable]=DB[eTable].map(function(x){return x.id===eId?Object.assign({id:x.id},rec):x});
    toast("Wax la bedelay ✓","ok");
  } else {
    rec.id=DB.nid[eTable]++;DB[eTable].push(rec);
    toast("La keydiyay ✓","ok");
  }
  closeMod();render();
}

function delRec(table,id){
  if(!confirm("Tirtirayaa?"))return;
  DB[table]=DB[table].filter(function(x){return x.id!==id});
  toast("La tirtiray","err");render();
}

function addPayment(cid){
  var c=DB.customers.find(function(x){return x.id===cid});if(!c)return;
  eId=cid;eTable="__pay";
  el("m-title").textContent="Geli Lacag-bixin — "+c.name;
  el("m-body").innerHTML=
    '<div class="bg-gray-700/50 rounded-lg p-3 mb-4">'
    +'<div class="text-xs text-gray-400 mb-1">Lacagta hadhay</div>'
    +'<div class="text-2xl font-bold text-red-400">'+money(c.resto)+'</div>'
    +'<div class="text-xs text-gray-500 mt-1">'+pct(c.paid,c.total)+'% hore loo bixiyay</div></div>'
    +formGroup("Lacagta La Bixiyay ($)",fi("f-pay","number","","0.00"));
  el("modal-bg").classList.add("open");
}

function savePay(){
  var amt=parseFloat(el("f-pay").value)||0;
  if(amt<=0){toast("Lacag saxda ah geli","err");return;}
  DB.customers=DB.customers.map(function(c){
    if(c.id!==eId)return c;
    var np=parseFloat(Math.min(c.paid+amt,c.total).toFixed(2));
    return Object.assign({},c,{paid:np,resto:parseFloat((c.total-np).toFixed(2))});
  });
  toast("Lacag-bixin la diiwaangeliyay ✓","ok");
  closeMod();render();
}

function closeMod(){el("modal-bg").classList.remove("open");eId=null;eTable=null;}
function bgClick(e){if(e.target===el("modal-bg"))closeMod();}

// ── EXPORT CSV ────────────────────────────────────────────
function exportCSV(){
  var tables={
    "Warshada_Waxsoosaarka":["Date,StoneType,Metre,Trucks,LaborCost,PorterCost,TruckCost"].concat(
      DB.production.map(function(r){return[r.date,r.stone,r.metre,r.trucks,r.labor,r.porter,r.truck].join(",")})),
    "Warshada_Macaamiisha":["CustomerName,Phone,Metre,PricePerMetre,TotalAmount,Paid,Resto"].concat(
      DB.customers.map(function(c){return[c.name,c.phone,c.metre,c.ppm,c.total,c.paid,c.resto].join(",")})),
    "Online_Betting":["Date,CashierName,PreviousBalance,NewBalance,Difference,Notes"].concat(
      DB.betting.map(function(b){return[b.date,b.cashier,b.prev,b.newb,b.diff,'"'+(b.notes||"")+'"'].join(",")})),
    "Qarashka_Guud":["StaffName,MonthlySalary,FamilyExpense,RentAndTransport,TotalExpense"].concat(
      DB.expenses.map(function(e){return[e.staff,e.salary,e.family,e.rent,e.total].join(",")}))
  };
  var csv="";
  Object.keys(tables).forEach(function(k){csv+="## "+k+"\n"+tables[k].join("\n")+"\n\n";});
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="business-hub-export.csv";a.click();
  toast("CSV la dejiyay ✓","ok");
}
